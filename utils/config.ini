[AUDIO]
sample_rate = 16000
channels = 1
chunk = 1024

[EDITOR]
width = 400
height = 700
font_name = MS Gothic
font_size = 12

[GOOGLE_STT]
model = chirp_3
language = ja-JP
phrase_set_file = technical_terms.txt
phrase_boost = 5.0
enable_automatic_punctuation = True

[GOOGLE_DOCS]
docs_url = https://docs.google.com/document/d/1Wo2-SvtRyU1YamR0b7LTFbCkZ8fvPvCqXkIpjeLa5sk/edit?usp=sharing
placeholder_text = 音声入力中…(60秒以内)
placeholder_wait_timeout = 10

[FORMATTING]
use_punctuation = True
use_comma = True

[KEYS]
toggle_recording = ctrl+alt+a
exit_app =
reload_audio =
toggle_punctuation =

[LOGGING]
log_retention_days = 7
log_directory = logs
log_level = INFO
debug_mode = False
project_name = VoiceDocs

[OPTIONS]
start_minimized = True

[PATHS]
replacements_file = replacements.txt
temp_dir = C:\Shinseikai\VoiceDocs\temp
cleanup_minutes = 10

[RECORDING]
auto_stop_timer = 60

[WINDOW]
width = 300
height = 450

